kind = "web"
previewPath = "/"
title = "Tech Events Hub"
version = "1.0.0"
id = "artifacts/events-hub"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23502

[services.development]
run = "pnpm --filter @workspace/events-hub run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/events-hub", "run", "build" ]
publicDir = "artifacts/events-hub/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23502"
BASE_PATH = "/"
